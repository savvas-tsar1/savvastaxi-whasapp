<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savvas Taxi WhatsApp</title>
  
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to right, #25D366, #128C7E);
      color: #fff;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Fade-in + bounce animation for the icon */
    @keyframes fadeBounce {
      0% { opacity: 0; transform: translateY(-20px); }
      50% { opacity: 1; transform: translateY(0); }
      60% { transform: translateY(-10px); }
      80% { transform: translateY(0); }
      100% { opacity: 1; transform: translateY(0); }
    }

    img.logo {
      width: 120px;
      margin-bottom: 20px;
      animation: fadeBounce 2s ease-in-out infinite;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
    }

    .button {
      display: block;
      width: 250px;
      margin: 15px auto;
      padding: 15px;
      font-size: 18px;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      transition: transform 0.3s, opacity 0.3s;
    }

    .button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .en { background-color: #34B7F1; }  /* English button blue */
    .gr { background-color: #FFD700; color: #000; } /* Greek button yellow */
    .ru { background-color: #FF4500; }  /* Russian button orange/red */

    footer {
      position: fixed;
      bottom: 10px;
      font-size: 14px;
      color: #eee;
    }

    @media(max-width: 500px){
      .button { width: 80%; font-size: 16px; padding: 12px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- Your uploaded taxi icon -->
  <img src="taxi.png" alt="Savvas Taxi" class="logo">

  <!-- Heading -->
  <h1>Welcome! Choose your language 🚖<br>Καλώς ήρθατε! Επιλέξτε γλώσσα<br>Добро пожаловать! Выберите язык</h1>

  <!-- WhatsApp Buttons -->
  <a class="button en" href="https://wa.me/35795992386?text=Hello%2C%20I%20need%20a%20ride" target="_blank">🇬🇧 English</a>
  <a class="button gr" href="https://wa.me/35795992386?text=%CE%93%CE%B5%CE%B9%CE%B1%20%CF%83%CE%B1%CF%82%2C%20%CF%87%CE%B5%CE%B9%CE%AC%CE%B6%CE%BF%CE%BC%CE%B1%CE%B9%20%CE%BC%CE%B9%CE%B1%20%CE%B4%CE%B9%CE%B1%CE%B4%CF%81%CE%BF%CE%BC%CE%AE" target="_blank">🇬🇷 Ελληνικά</a>
  <a class="button ru" href="https://wa.me/35795992386?text=%D0%97%D0%B4%D1%80%D0%B0%D1%81%D1%82%D0%B2%D1%83%D0%B9%D1%82%D0%B5%2C%20%D0%BC%D0%BD%D0%B5%20%D0%BD%D1%83%D0%B6%D0%BD%D0%B0%20%D0%BF%D0%BE%D0%B5%D0%B7%D0%B4%D0%BA%D0%B0" target="_blank">🇷🇺 Русский</a>

  <!-- Footer -->
  <footer>Savvas Taxi – Your friendly ride in Cyprus 🚖</footer>

</body>
</html>
